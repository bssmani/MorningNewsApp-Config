name: Auto-Update RSS Feeds
on:
  schedule:
    - cron: "0 0,12 * * *" # Runs at 00:00 and 12:00 every day
  workflow_dispatch:        # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Auto-Updater Script
        run: |
          python scripts/populate_feeds.py
      - name: Commit and Push
        run: |
          git config --global user.name "RSS Auto-Updater"
          git config --global user.email "actions@github.com"
          git add gistfile1.json
          git commit -m "Automated feed update $(date)" || echo "No changes to commit"
          git push
