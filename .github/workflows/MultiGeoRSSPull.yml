name: Multi-Geo RSS Feed Curator

on:
  schedule:
    - cron: "30 18 * * *"   # Runs daily at 11:30 PM IST (18:00 UTC)
  workflow_dispatch:         # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4

      - name: Run MultiGeoRSS script
        run: python MultiGeoRSS.py

      - name: Commit geo JSON files to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gistfile*.json
          git commit -m "Daily geo RSS feed update"
          git push
