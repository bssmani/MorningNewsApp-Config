name: Morning News Auto-Fetcher

# Run every 2 hours, and also allow manual triggering
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Scraper
        run: python generate_news.py

      - name: Commit and Push Master JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_news_dump.json
          git commit -m "Auto-update: Latest news brewed ☕" || echo "No new news to commit"
          git push
