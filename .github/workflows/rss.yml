name: Daily RSS Feed Collector

on:
  schedule:
    - cron: "30 23 * * *"   # Runs every day at 5:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4

      - name: Run RSS script
        run: python daily_rss.py

      - name: Upload gistfile2.json to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -X PATCH \
            https://api.github.com/gists/bssmani \
            -d '{"files": {"gistfile2.json": {"content": "'"$(cat gistfile2.json)"'"}}}'

      - name: Commit gistfile2.json to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gistfile2.json
          git commit -m "Daily update of gistfile2.json"
          git push
